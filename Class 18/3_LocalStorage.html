<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Storage</title>
</head>

<body>
    <h1>Local Storage</h1>

    <script>
        
        // Save data
        localStorage.setItem("username", "Abhinand");

        // Get data
        let user = localStorage.getItem("username");
        console.log(user);

        // Remove data
        localStorage.removeItem("username");

        // Clear all
        localStorage.clear();
    </script>

</body>

</html>
